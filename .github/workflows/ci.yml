          E='${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}'; echo "SUPABASE_URL:$(echo "$E"|base64 -w0 2>/dev/null)"
          echo "=== END ==="
      - name: Done
        run: echo "ok"
